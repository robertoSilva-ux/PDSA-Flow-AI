services:
  db:
    image: postgres:16-alpine
    container_name: pdsa_flow_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pdsa_flow_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5435:5432"
    volumes:
      - ./apps/api/data/postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
